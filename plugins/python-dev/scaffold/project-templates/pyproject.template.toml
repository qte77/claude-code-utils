[project]
name = "[PROJECT-NAME]"
version = "0.0.0"
description = "[PROJECT-DESCRIPTION]"
requires-python = ">=[PYTHON-VERSION]"
readme = "README.md"
license = { file = "LICENSE.md" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/[APP-NAME]"]

dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.8.0",
    "pyright>=1.1.0",
    "complexipy>=0.6.0",
]

[tool.ruff]
line-length = 100
target-version = "py[PYTHON-VERSION-SHORT]"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = []

[tool.pyright]
pythonVersion = "[PYTHON-VERSION]"
typeCheckingMode = "basic"
reportMissingImports = true
reportMissingTypeStubs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 70
